<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Point Guard Scout v5</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --accent-orange: #ff9500;
            --accent-blue: #007aff;
            --danger: #ff3b30;
            --success: #34c759;
            --text-main: #ffffff;
            --text-dim: #888;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text-main); margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        .scorecard {
            background: var(--card); width: 100%; max-width: 400px; border-radius: 20px;
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 15px; border: 1px solid #333;
            box-sizing: border-box;
        }

        #grade { font-size: 80px; font-weight: 900; margin: 0; color: var(--accent-orange); line-height: 1; text-align: center;}
        .process-row { display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; }
        .process-item { display: flex; flex-direction: column; align-items: center; }
        .process-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .process-val { font-size: 18px; font-weight: bold; color: #fff; }

        .section-label { align-self: flex-start; font-size: 11px; font-weight: bold; color: var(--text-dim); margin: 10px 5px; text-transform: uppercase; }
        
        /* Main Focus Tiles */
        .focus-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 10px; }
        .tile {
            background: var(--card); border: 1px solid #333; border-radius: 16px;
            height: 90px; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .tile:active { opacity: 0.7; transform: scale(0.96); }
        .tile span { font-size: 24px; font-weight: bold; margin-bottom: 4px; }
        .tile label { font-size: 9px; font-weight: 800; color: var(--text-dim); text-align: center; }

        /* Missed/Penalty Row (3 Buttons) */
        .miss-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 20px; }
        .btn-miss { background: #222; border: 1px solid #444; color: #aaa; height: 60px; border-radius: 12px; font-size: 9px; font-weight: bold; cursor: pointer; }
        .btn-penalty { background: rgba(255, 59, 48, 0.15); border: 1px solid var(--danger); color: var(--danger); height: 60px; border-radius: 12px; font-size: 9px; font-weight: bold; cursor: pointer; }

        /* Standard Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 400px; }
        button.stat-btn { background: var(--card); border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-blue { border-color: var(--accent-blue) !important; color: var(--accent-blue) !important; }

        .game-controls { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 8px; width: 100%; max-width: 400px; margin-top: 20px; }
        input { background: #111; border: 1px solid #333; color: white; border-radius: 8px; padding: 10px; text-align: center; box-sizing: border-box; width: 100%; }

        .history { width: 100%; max-width: 400px; margin-top: 30px; text-align: left; }
        .history-card { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 8px; font-size: 11px; border-left: 4px solid var(--accent-orange); }
    </style>
</head>
<body>

    <div class="scorecard">
        <div id="grade">D</div>
        <div class="process-row">
            <div class="process-item">
                <div class="process-label">Floater Made</div>
                <div id="c-flt" class="process-val">0</div>
            </div>
            <div class="process-item">
                <div class="process-label">Layup Made</div>
                <div id="c-lay" class="process-val">0</div>
            </div>
            <div class="process-item">
                <div class="process-label">Def Comm</div>
                <div id="c-comm" class="process-val">0</div>
            </div>
        </div>
    </div>

    <div class="section-label">Player Focus (Heavy Grade Weights)</div>
    <div class="focus-grid">
        <div class="tile" onclick="handle('flt', 2, 14)">
            <span style="color:var(--accent-orange)">🏀</span>
            <label>FLOATER MADE<br>(+14)</label>
        </div>
        <div class="tile" onclick="handle('lay', 2, 14)">
            <span style="color:var(--accent-orange)">🔥</span>
            <label>LAY-UP MADE<br>(+14)</label>
        </div>
        <div class="tile" onclick="handle('comm', 0, 10)">
            <span style="color:var(--accent-blue)">🗣️</span>
            <label>DEF COMM<br>(+10)</label>
        </div>
    </div>

    <div class="miss-row">
        <button class="btn-miss" onclick="handle('flt_x', 0, 0)">FLOATER MISS</button>
        <button class="btn-miss" onclick="handle('lay_x', 0, 0)">LAY-UP MISS</button>
        <button class="btn-penalty" onclick="handle('ma', 0, -20)">MISSED ASGN (<span id="c-ma">0</span>)<br>[-20]</button>
    </div>

    <div class="section-label">Box Score Stats</div>
    <div class="stats-grid">
        <button class="stat-btn" onclick="handle('2m', 2, 4)">OTHER 2PT MADE</button>
        <button class="stat-btn" onclick="handle('2x', 0, -2)">2PT MISS</button>
        <button class="stat-btn" style="color:var(--success); border-color:var(--success);" onclick="handle('3m', 3, 5)">3PT MADE</button>
        <button class="stat-btn" onclick="handle('3x', 0, -2)">3PT MISS</button>
        <button class="stat-btn btn-blue" onclick="handle('ast', 0, 7)">ASSIST</button>
        <button class="stat-btn btn-blue" onclick="handle('stl', 0, 6)">STEAL</button>
        <button class="stat-btn btn-blue" onclick="handle('reb', 0, 4)">REBOUND</button>
        <button class="stat-btn" style="color:var(--danger); border-color:var(--danger);" onclick="handle('to', 0, -7)">TURNOVER</button>
    </div>

    <div class="game-controls">
        <input type="text" id="opp-input" placeholder="Opponent">
        <button id="wl-btn" style="background:#222; color:white; border:1px solid #444; border-radius:8px;" onclick="toggleWL()">W/L</button>
        <button style="background:var(--success); color:black; font-weight:bold; border-radius:8px; border:none;" onclick="save()">SAVE</button>
    </div>

    <div style="display:flex; gap:10px; margin-top:10px; width:100%; max-width:400px;">
        <button onclick="undo()" style="flex:1; background:#222; color:white; border:none; padding:12px; border-radius:8px;">UNDO</button>
        <button onclick="reset()" style="flex:1; background:#222; color:white; border:none; padding:12px; border-radius:8px;">RESET</button>
    </div>

    <div class="history">
        <div class="section-label">Season Logs</div>
        <div id="h-list"></div>
    </div>

    <script>
        let data = { pts: 0, ast: 0, reb: 0, stl: 0, to: 0, flt: 0, flt_x: 0, lay: 0, lay_x: 0, comm: 0, ma: 0, fga: 0, fgm: 0 };
        let raw = 0, stack = [], winLoss = "N/A";

        function toggleWL() {
            let btn = document.getElementById('wl-btn');
            winLoss = (winLoss === "WIN") ? "LOSS" : "WIN";
            btn.innerText = winLoss;
            btn.style.borderColor = (winLoss === "WIN") ? "var(--success)" : "var(--danger)";
        }

        function handle(type, ptVal, gradeVal) {
            stack.push({t: type, p: ptVal, g: gradeVal});
            raw += gradeVal;
            data.pts += ptVal;
            if (data.hasOwnProperty(type)) data[type]++;
            
            if (['flt', 'lay', '2m', '3m'].includes(type)) { data.fgm++; data.fga++; }
            if (['flt_x', 'lay_x', '2x', '3x'].includes(type)) { data.fga++; }
            
            refresh();
        }

        function undo() {
            if (!stack.length) return;
            let item = stack.pop();
            raw -= item.g; data.pts -= item.p;
            if (data.hasOwnProperty(item.t)) data[item.t]--;
            if (['flt', 'lay', '2m', '3m'].includes(item.t)) { data.fgm--; data.fga--; }
            if (['flt_x', 'lay_x', '2x', '3x'].includes(item.t)) { data.fga--; }
            refresh();
        }

        function refresh() {
            document.getElementById('c-flt').innerText = data.flt;
            document.getElementById('c-lay').innerText = data.lay;
            document.getElementById('c-comm').innerText = data.comm;
            document.getElementById('c-ma').innerText = data.ma;
            
            let g = "D"; let col = "var(--accent-orange)";
            if (raw >= 250) { g = "A+"; col = "var(--success)"; }
            else if (raw >= 200) { g = "A"; col = "var(--success)"; }
            else if (raw >= 150) { g = "B"; col = "var(--accent-orange)"; }
            else if (raw >= 100) { g = "C"; col = "var(--accent-orange)"; }
            
            document.getElementById('grade').innerText = g;
            document.getElementById('grade').style.color = col;
        }

        function save() {
            let opp = document.getElementById('opp-input').value || "Unknown";
            let game = { id: Date.now(), d: new Date().toLocaleDateString(), g: document.getElementById('grade').innerText, p: data.pts, flt: data.flt, flt_x: data.flt_x, lay: data.lay, lay_x: data.lay_x, comm: data.comm, ma: data.ma, wl: winLoss, opp: opp };
            let list = JSON.parse(localStorage.getItem('bb_stats_v5') || "[]");
            list.unshift(game);
            localStorage.setItem('bb_stats_v5', JSON.stringify(list));
            reset();
            showHistory();
        }

        function showHistory() {
            let list = JSON.parse(localStorage.getItem('bb_stats_v5') || "[]");
            document.getElementById('h-list').innerHTML = list.map(i => `
                <div class="history-card">
                    <b>${i.d} vs ${i.opp} [${i.wl}]</b><br>
                    Grade: ${i.g} | ${i.p} PTS<br>
                    Floater: ${i.flt}/${i.flt + i.flt_x} | Layup: ${i.lay}/${i.lay + i.lay_x} | Comm: ${i.comm}
                </div>`).join('');
        }

        function reset() {
            data = { pts: 0, ast: 0, reb: 0, stl: 0, to: 0, flt: 0, flt_x: 0, lay: 0, lay_x: 0, comm: 0, ma: 0, fga: 0, fgm: 0 };
            raw = 0; stack = [];
            document.getElementById('opp-input').value = "";
            refresh();
        }
        showHistory();
    </script>
</body>
</html>
