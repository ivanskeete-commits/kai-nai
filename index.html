<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding-bottom: 80px; -webkit-tap-highlight-color: transparent; }
        .header { background: #1a1a1a; padding: 15px; border-bottom: 2px solid #333; }
        #grade { font-size: 70px; font-weight: bold; color: orange; margin: 0; line-height: 1; }
        #pt-subtitle { font-size: 14px; color: #ff9500; font-weight: bold; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-bar { display: grid; grid-template-columns: repeat(6, 1fr); background: #222; margin: 10px; padding: 10px; border-radius: 10px; font-size: 9px; }
        .stat-val { font-size: 16px; font-weight: bold; display: block; color: #007aff; }
        #percent-display { grid-column: span 6; color: #34c759; font-weight: bold; padding-top: 8px; border-top: 1px solid #333; margin-top: 8px; font-size: 9px; display: flex; justify-content: space-around; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        button { padding: 18px 10px; border-radius: 12px; border: none; color: white; font-weight: bold; font-size: 13px; background: #444; cursor: pointer; }
        button:active { opacity: 0.5; transform: scale(0.95); }
        .btn-green { background: #34c759; }
        .btn-blue { background: #007aff; }
        .btn-red { background: #ff3b30; }
        .btn-purple { background: #5856d6; }
        .btn-orange { background: #ff9500; color: #000; }
        
        /* Focus Buttons */
        .focus-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 10px; }
        .focus-btn { height: 90px; font-size: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; text-transform: uppercase; }
        .focus-btn span { font-size: 24px; display: block; }
        .penalty-btn { width: calc(100% - 20px); margin: 0 10px 10px 10px; background: #8e0000; color: #fff; height: 60px; font-size: 16px; font-weight: bold; border-radius: 12px; border: none; }

        .history { text-align: left; padding: 15px; background: #111; margin-top: 20px; border-radius: 10px; }
        .history-item { border-bottom: 1px solid #222; padding: 10px 0; }
        .history-main { font-size: 13px; margin-bottom: 4px; font-weight: bold; }
        .history-stats { font-size: 10px; color: #888; margin-bottom: 2px; }
        
        .game-info-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 8px; padding: 0 10px 10px 10px; }
        .input-box { background: #222; border: 1px solid #444; border-radius: 12px; color: #fff; font-size: 14px; font-weight: bold; text-align: center; height: 55px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">
        <div id="grade">D</div>
        <div id="pt-subtitle">FLT: 0 | LAY: 0 | COMM: 0</div>
    </div>

    <div class="stat-bar">
        <div>PTS<span id="s-pts" class="stat-val">0</span></div>
        <div>AST<span id="s-ast" class="stat-val">0</span></div>
        <div>REB<span id="s-reb" class="stat-val">0</span></div>
        <div>STL<span id="s-stl" class="stat-val">0</span></div>
        <div>BLK<span id="s-blk" class="stat-val">0</span></div>
        <div>TO<span id="s-to" class="stat-val">0</span></div>
        <div id="percent-display">
            <span>FG: 0% (0/0)</span>
            <span>3PT: 0% (0/0)</span>
            <span>FT: 0% (0/0)</span>
        </div>
    </div>

    <div class="focus-grid">
        <button class="focus-btn btn-orange" onclick="handle('flt', 0, 14)">
            <span id="c-flt">0</span>FLOATER
        </button>
        <button class="focus-btn btn-orange" onclick="handle('lay', 0, 14)">
            <span id="c-lay">0</span>LAY-UP
        </button>
        <button class="focus-btn btn-blue" onclick="handle('comm', 0, 14)">
            <span id="c-comm">0</span>DEF COMM
        </button>
    </div>

    <button class="penalty-btn" onclick="handle('ma', 0, -20)">
        MISSED ASSIGNMENT (<span id="c-ma">0</span>)
    </button>

    <div class="grid">
        <button class="btn-green" onclick="handle('2m', 2, 4)">2PT MADE</button>
        <button style="background:#444;" onclick="handle('2x', 0, -2)">2PT MISS</button>
        <button class="btn-green" onclick="handle('3m', 3, 5)">3PT MADE</button>
        <button style="background:#444;" onclick="handle('3x', 0, -2)">3PT MISS</button>
        <button class="btn-purple" onclick="handle('ft-m', 1, 1)">FT MADE</button>
        <button style="background:#444;" onclick="handle('ft-x', 0, -2)">FT MISS</button>
        <button class="btn-blue" onclick="handle('ast', 0, 7)">ASSIST</button>
        <button class="btn-blue" onclick="handle('stl', 0, 6)">STEAL</button>
        <button class="btn-blue" onclick="handle('reb', 0, 4)">REBOUND</button>
        <button class="btn-blue" onclick="handle('blk', 0, 6)">BLOCK</button>
        <button class="btn-red" style="grid-column: span 2;" onclick="handle('to', 0, -7)">TURNOVER</button>
    </div>

    <div class="game-info-grid">
        <input type="text" id="opp-input" class="input-box" placeholder="OPPONENT">
        <button id="win-loss-btn" style="background:#333; color: white; border-radius: 12px; border: 1px solid #444;" onclick="toggleWL()">W / L</button>
        <input type="text" id="score-input" class="input-box" placeholder="SCORE">
    </div>

    <div style="display: flex; gap: 10px; padding: 10px;">
        <button style="flex:1; background:#444;" onclick="undo()">UNDO</button>
        <button style="flex:1; background: #34c759; color: #000;" onclick="save()">SAVE GAME</button>
        <button style="flex:1; background:#444;" onclick="reset()">RESET</button>
    </div>

    <div class="history">
        <div style="color: orange; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 5px;">Season History</div>
        <div id="h-list" style="font-size: 12px; padding-top: 10px;"></div>
    </div>

    <script>
        var data = { pts: 0, ast: 0, reb: 0, stl: 0, blk: 0, to: 0, ftm: 0, fta: 0, fgm: 0, fga: 0, tpm: 0, tpa: 0, flt: 0, lay: 0, comm: 0, ma: 0 };
        var raw = 0;
        var stack = [];
        var winLoss = "N/A";

        function toggleWL() {
            var btn = document.getElementById('win-loss-btn');
            if (winLoss !== "WIN") { winLoss = "WIN"; btn.innerText = "WIN"; btn.style.background = "#34c759"; btn.style.color = "#000"; }
            else { winLoss = "LOSS"; btn.innerText = "LOSS"; btn.style.background = "#ff3b30"; btn.style.color = "#fff"; }
        }

        function handle(type, ptVal, gradeVal) {
            stack.push({t: type, p: ptVal, g: gradeVal});
            raw += gradeVal;
            data.pts += ptVal;
            if (data.hasOwnProperty(type)) data[type]++;
            if (type === '2m') { data.fgm++; data.fga++; }
            if (type === '2x') { data.fga++; }
            if (type === '3m') { data.fgm++; data.fga++; data.tpm++; data.tpa++; }
            if (type === '3x') { data.fga++; data.tpa++; }
            if (type === 'ft-m') { data.ftm++; data.fta++; }
            if (type === 'ft-x') { data.fta++; }
            refresh();
        }

        function undo() {
            if (stack.length === 0) return;
            var item = stack.pop();
            raw -= item.g;
            data.pts -= item.p;
            var t = item.t;
            if (data.hasOwnProperty(t)) data[t]--;
            if (t === '2m') { data.fgm--; data.fga--; }
            if (t === '2x') { data.fga--; }
            if (t === '3m') { data.fgm--; data.fga--; data.tpm--; data.tpa--; }
            if (t === '3x') { data.fga--; data.tpa--; }
            if (t === 'ft-m') { data.ftm--; data.fta--; }
            if (t === 'ft-x') { data.fta--; }
            refresh();
        }

        function refresh() {
            document.getElementById('c-flt').innerText = data.flt;
            document.getElementById('c-lay').innerText = data.lay;
            document.getElementById('c-comm').innerText = data.comm;
            document.getElementById('c-ma').innerText = data.ma;
            document.getElementById('pt-subtitle').innerText = `FLT: ${data.flt} | LAY: ${data.lay} | COMM: ${data.comm}`;
            document.getElementById('s-ast').innerText = data.ast;
            document.getElementById('s-reb').innerText = data.reb;
            document.getElementById('s-stl').innerText = data.stl;
            document.getElementById('s-blk').innerText = data.blk;
            document.getElementById('s-to').innerText = data.to;
            document.getElementById('s-pts').innerText = data.pts;
            
            var fgPct = data.fga > 0 ? Math.round((data.fgm / data.fga) * 100) : 0;
            var tpPct = data.tpa > 0 ? Math.round((data.tpm / data.tpa) * 100) : 0;
            var ftPct = data.fta > 0 ? Math.round((data.ftm / data.fta) * 100) : 0;
            document.getElementById('percent-display').innerHTML = `<span>FG: ${fgPct}%</span><span>3PT: ${tpPct}%</span><span>FT: ${ftPct}%</span>`;
            
            var g = "D"; var col = "orange";
            if (raw >= 250) { g = "A+"; col = "#32d74b"; }
            else if (raw >= 200) { g = "A"; col = "#32d74b"; }
            else if (raw >= 150) { g = "B"; col = "orange"; }
            else if (raw >= 100) { g = "C"; col = "orange"; }
            document.getElementById('grade').innerText = g;
            document.getElementById('grade').style.color = col;
        }

        function save() {
            var opp = document.getElementById('opp-input').value;
            if (!opp || winLoss === "N/A") { alert("Enter Opponent & Result"); return; }
            var game = { id: Date.now(), d: new Date().toLocaleDateString(), g: document.getElementById('grade').innerText, p: data.pts, ast: data.ast, reb: data.reb, stl: data.stl, blk: data.blk, to: data.to, flt: data.flt, lay: data.lay, comm: data.comm, ma: data.ma, wl: winLoss, opp: opp, score: document.getElementById('score-input').value };
            var list = JSON.parse(localStorage.getItem('nephew_stats_v2') || "[]");
            list.unshift(game);
            localStorage.setItem('nephew_stats_v2', JSON.stringify(list));
            reset();
            showHistory();
        }

        function showHistory() {
            var list = JSON.parse(localStorage.getItem('nephew_stats_v2') || "[]");
            document.getElementById('h-list').innerHTML = list.map(i => `
                <div class="history-item">
                    <div class="history-main">${i.d} vs ${i.opp} [${i.wl}]</div>
                    <div class="history-stats">${i.p} PTS | ${i.flt} FLT | ${i.lay} LAY | ${i.comm} COMM | ${i.ma} MA</div>
                    <div style="font-weight:bold; color:#32d74b">Grade: ${i.g}</div>
                </div>`).join('') || "No games tracked.";
        }

        function reset() {
            data = { pts: 0, ast: 0, reb: 0, stl: 0, blk: 0, to: 0, ftm: 0, fta: 0, fgm: 0, fga: 0, tpm: 0, tpa: 0, flt: 0, lay: 0, comm: 0, ma: 0 };
            raw = 0; stack = []; winLoss = "N/A";
            document.getElementById('opp-input').value = "";
            document.getElementById('score-input').value = "";
            document.getElementById('win-loss-btn').style.background = "#333";
            document.getElementById('win-loss-btn').innerText = "W / L";
            refresh();
        }
        showHistory();
    </script>
</body>
</html>
