<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding-bottom: 80px; -webkit-tap-highlight-color: transparent; }
        .header { background: #1a1a1a; padding: 15px; border-bottom: 2px solid #333; }
        #grade { font-size: 70px; font-weight: bold; color: orange; margin: 0; line-height: 1; }
        #pt-subtitle { font-size: 14px; color: #ff9500; font-weight: bold; margin-top: 5px; text-transform: uppercase; }
        .stat-bar { display: grid; grid-template-columns: repeat(6, 1fr); background: #222; margin: 10px; padding: 10px; border-radius: 10px; font-size: 9px; }
        .stat-val { font-size: 16px; font-weight: bold; display: block; color: #007aff; }
        #percent-display { grid-column: span 6; color: #34c759; font-weight: bold; padding-top: 8px; border-top: 1px solid #333; margin-top: 8px; font-size: 10px; display: flex; justify-content: space-around; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        button { padding: 18px 10px; border-radius: 12px; border: none; color: white; font-weight: bold; font-size: 13px; background: #444; }
        .btn-green { background: #34c759; }
        .btn-blue { background: #007aff; }
        .btn-red { background: #ff3b30; }
        .btn-purple { background: #5856d6; }
        .btn-orange { background: #ff9500; color: #000; }
        .focus-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 10px; margin-bottom: 8px; }
        .small-btn { padding: 10px 5px; font-size: 10px; height: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <div id="grade">D</div>
        <div id="pt-subtitle">FLT: 0/0 | LAY: 0/0 | COMM: 0</div>
    </div>

    <div class="stat-bar">
        <div>PTS<span id="s-pts" class="stat-val">0</span></div>
        <div>AST<span id="s-ast" class="stat-val">0</span></div>
        <div>REB<span id="s-reb" class="stat-val">0</span></div>
        <div>STL<span id="s-stl" class="stat-val">0</span></div>
        <div>BLK<span id="s-blk" class="stat-val">0</span></div>
        <div>TO<span id="s-to" class="stat-val">0</span></div>
        <div id="percent-display">
            <span id="p-fg">FG: 0% (0/0)</span>
            <span id="p-3p">3PT: 0% (0/0)</span>
            <span id="p-ft">FT: 0% (0/0)</span>
        </div>
    </div>

    <div class="focus-row">
        <button class="btn-orange" onclick="handle('flt', 2, 13)">FLOATER MADE</button>
        <button class="btn-orange" onclick="handle('lay', 2, 13)">LAY-UP MADE</button>
        <button class="btn-blue" onclick="handle('comm', 0, 9)">DEF COMM</button>
    </div>

    <div class="focus-row">
        <button class="small-btn" style="background:#222;" onclick="handle('flt_x', 0, 13)">FLOATER MISS</button>
        <button class="small-btn" style="background:#222;" onclick="handle('lay_x', 0, 13)">LAY-UP MISS</button>
        <button class="small-btn btn-red" onclick="handle('ma', 0, -20)">MISSED ASGN</button>
    </div>

    <div class="grid">
        <button class="btn-green" onclick="handle('2m', 2, 4)">OTHER 2PT MADE</button>
        <button onclick="handle('2x', 0, -2)">2PT MISS</button>
        <button class="btn-green" onclick="handle('3m', 3, 5)">3PT MADE</button>
        <button onclick="handle('3x', 0, -2)">3PT MISS</button>
        <button class="btn-purple" onclick="handle('ftm', 1, 1)">FT MADE</button>
        <button onclick="handle('ftx', 0, -2)">FT MISS</button>
        <button class="btn-blue" onclick="handle('ast', 0, 7)">ASSIST</button>
        <button class="btn-blue" onclick="handle('stl', 0, 6)">STEAL</button>
        <button class="btn-blue" onclick="handle('reb', 0, 4)">REBOUND</button>
        <button class="btn-red" onclick="handle('to', 0, -7)">TURNOVER</button>
    </div>

    <div style="display: flex; gap: 10px; padding: 10px;">
        <button style="flex:1;" onclick="undo()">UNDO</button>
        <button style="flex:1; background: #34c759; color: #000;" onclick="save()">SAVE</button>
        <button style="flex:1;" onclick="reset()">RESET</button>
    </div>

    <div id="h-list" style="text-align: left; padding: 10px; font-size: 12px; color: #888;"></div>

    <script>
        var data = { pts: 0, ast: 0, reb: 0, stl: 0, blk: 0, to: 0, flt: 0, flt_x: 0, lay: 0, lay_x: 0, comm: 0, ma: 0, ftm: 0, ftx: 0, fgm: 0, fga: 0, tpm: 0, tpa: 0, fta: 0 };
        var raw = 0;
        var stack = [];

        function handle(type, ptVal, gradeVal) {
            stack.push({t: type, p: ptVal, g: gradeVal});
            raw += gradeVal;
            data.pts += ptVal;
            if (data.hasOwnProperty(type)) data[type]++;
            
            if (['flt', 'lay', '2m', '3m'].includes(type)) { data.fgm++; data.fga++; }
            if (['flt_x', 'lay_x', '2x', '3x'].includes(type)) { data.fga++; }
            if (type === '3m') { data.tpm++; data.tpa++; }
            if (type === '3x') { data.tpa++; }
            if (type === 'ftm' || type === 'ftx') { data.fta++; }
            
            refresh();
        }

        function undo() {
            if (stack.length === 0) return;
            var item = stack.pop();
            raw -= item.g;
            data.pts -= item.p;
            if (data.hasOwnProperty(item.t)) data[item.t]--;
            
            if (['flt', 'lay', '2m', '3m'].includes(item.t)) { data.fgm--; data.fga--; }
            if (['flt_x', 'lay_x', '2x', '3x'].includes(item.t)) { data.fga--; }
            if (item.t === '3m') { data.tpm--; data.tpa--; }
            if (item.t === '3x') { data.tpa--; }
            if (item.t === 'ftm' || item.t === 'ftx') { data.fta--; }
            
            refresh();
        }

        function refresh() {
            document.getElementById('pt-subtitle').innerText = `FLT: ${data.flt}/${data.flt + data.flt_x} | LAY: ${data.lay}/${data.lay + data.lay_x} | COMM: ${data.comm}`;
            document.getElementById('s-pts').innerText = data.pts;
            document.getElementById('s-ast').innerText = data.ast;
            document.getElementById('s-reb').innerText = data.reb;
            document.getElementById('s-stl').innerText = data.stl;
            document.getElementById('s-blk').innerText = data.blk || 0;
            document.getElementById('s-to').innerText = data.to;

            var fgPct = data.fga > 0 ? Math.round((data.fgm / data.fga) * 100) : 0;
            var tpPct = data.tpa > 0 ? Math.round((data.tpm / data.tpa) * 100) : 0;
            var ftPct = data.fta > 0 ? Math.round((data.ftm / data.fta) * 100) : 0;

            document.getElementById('p-fg').innerText = `FG: ${fgPct}% (${data.fgm}/${data.fga})`;
            document.getElementById('p-3p').innerText = `3PT: ${tpPct}% (${data.tpm}/${data.tpa})`;
            document.getElementById('p-ft').innerText = `FT: ${ftPct}% (${data.ftm}/${data.fta})`;
            
            var g = "D"; var col = "orange";
            if (raw >= 250) { g = "A+"; col = "#32d74b"; }
            else if (raw >= 200) { g = "A"; col = "#32d74b"; }
            else if (raw >= 150) { g = "B"; col = "orange"; }
            else if (raw >= 100) { g = "C"; col = "orange"; }
            document.getElementById('grade').innerText = g;
            document.getElementById('grade').style.color = col;
        }

        function save() {
            var game = { d: new Date().toLocaleDateString(), g: document.getElementById('grade').innerText, p: data.pts };
            var list = JSON.parse(localStorage.getItem('nephew_v10') || "[]");
            list.unshift(game);
            localStorage.setItem('nephew_v10', JSON.stringify(list));
            reset();
            showHistory();
        }

        function showHistory() {
            var list = JSON.parse(localStorage.getItem('nephew_v10') || "[]");
            document.getElementById('h-list').innerHTML = list.map(i => `<div>${i.d}: Grade ${i.g} (${i.p} pts)</div>`).join('');
        }

        function reset() {
            data = { pts: 0, ast: 0, reb: 0, stl: 0, blk: 0, to: 0, flt: 0, flt_x: 0, lay: 0, lay_x: 0, comm: 0, ma: 0, ftm: 0, ftx: 0, fgm: 0, fga: 0, tpm: 0, tpa: 0, fta: 0 };
            raw = 0; stack = [];
            refresh();
        }
        showHistory();
    </script>
</body>
</html>
